services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vertuta
      POSTGRES_USER: vertuta
      POSTGRES_PASSWORD: vertuta
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertuta"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=vertuta;Username=vertuta;Password=vertuta"
      AllowedOrigins__0: "http://localhost:3000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_HISTORY_API_URL: ""
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - server
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
